<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    :root {
      --text: #1f1339;
      --muted: #4e3d73;
      --card-bg: rgba(255, 255, 255, 0.9);
      --shadow: 0 14px 40px rgba(74, 25, 116, 0.25);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(
        135deg,
        #feda75 0%,
        #fa7e1e 22%,
        #d62976 47%,
        #962fbf 73%,
        #4f5bd5 100%
      );
      background-size: 180% 180%;
      animation: bgShift 12s ease infinite;
    }

    .card {
      width: min(640px, 100%);
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px 24px;
      animation: cardIn 700ms ease-out both;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -20% -20% auto auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.55), transparent 72%);
      animation: floatGlow 6s ease-in-out infinite;
      pointer-events: none;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: clamp(1.6rem, 2.8vw, 2rem);
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }

    li {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--muted);
      transform: translateY(8px);
      opacity: 0;
      animation: itemIn 500ms ease-out forwards;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    li::before {
      content: "•";
      color: #d62976;
      margin-right: 10px;
      font-weight: 700;
    }

    li:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 1);
      box-shadow: 0 9px 20px rgba(214, 41, 118, 0.22);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-start;
    }

    .generate-btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6a95, #d62976, #962fbf);
      box-shadow: 0 10px 22px rgba(150, 47, 191, 0.35);
      transition: transform 160ms ease, box-shadow 200ms ease, filter 200ms ease;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(150, 47, 191, 0.42);
      filter: saturate(1.05);
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .generate-btn:focus-visible {
      outline: 3px solid rgba(79, 91, 213, 0.4);
      outline-offset: 2px;
    }

    li.refresh {
      animation: pop 360ms ease;
    }

    li:nth-child(1) {
      animation-delay: 120ms;
    }

    li:nth-child(2) {
      animation-delay: 240ms;
    }

    li:nth-child(3) {
      animation-delay: 360ms;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes itemIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatGlow {
      0%, 100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(10px, 18px);
      }
    }

    @keyframes bgShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes pop {
      0% {
        transform: scale(0.98);
        opacity: 0.75;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Генератор идей для постов</h1>
    <p class="subtitle">Нажмите на кнопку и получите новый набор контент-идей.</p>
    <ul id="ideasList">
      <li>5 идей постов для экспертов</li>
      <li>3 идеи сторис на сегодня</li>
      <li>контент-план на неделю</li>
    </ul>
    <div class="actions">
      <button class="generate-btn" id="generateBtn" type="button">Сгенерировать</button>
    </div>
  </main>

  <script>
    const ideasPool = [
      [
        "5 идей постов для экспертов",
        "3 идеи сторис на сегодня",
        "контент-план на неделю"
      ],
      [
        "4 темы для прогрева аудитории перед продажей",
        "3 сторис с личной историей эксперта",
        "рубрики для блога на 7 дней"
      ],
      [
        "5 постов с частыми ошибками клиентов",
        "3 быстрые сторис с опросами",
        "контент-план на неделю с CTA"
      ],
      [
        "5 экспертных постов для роста доверия",
        "3 сторис с закулисьем работы",
        "недельный план: польза + вовлечение + продажа"
      ]
    ];

    const ideasList = document.getElementById("ideasList");
    const generateBtn = document.getElementById("generateBtn");
    let currentIndex = 0;

    generateBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % ideasPool.length;
      const nextSet = ideasPool[currentIndex];
      const items = ideasList.querySelectorAll("li");

      items.forEach((item, index) => {
        item.classList.remove("refresh");
        void item.offsetWidth;
        item.textContent = nextSet[index];
        item.classList.add("refresh");
      });
    });
  </script>
</body>
</html>
